name: doctor-slot-check

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: show files
        run: ls -la

      - name: show repo structure
        run: find .

      - name: show main.py content
        run: cat main.py

      - name: run python
        run: python main.py
